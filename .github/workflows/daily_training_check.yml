name: Daily Training Reminder Check

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  check-training-dates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training reminder script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python send_training_reminders.py
